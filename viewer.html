<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Intelligence &amp; Pitch Suite — Pandan Labs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  body {
    background-color: #262624;
    color: hsl(0 0% 98%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
  }
  .heart { display: inline-block; color: #D17D59; transform: translateY(-1px); margin: 0 0.125rem; }
  .prose-doc {
    line-height: 1.7;
    color: hsl(0 0% 88%);
  }
  .prose-doc h1 {
    font-size: 2rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 0;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid hsl(240 3.7% 15.9%);
  }
  .prose-doc h2 {
    font-size: 1.5rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }
  .prose-doc h3 {
    font-size: 1.15rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 2rem;
    margin-bottom: 0.75rem;
  }
  .prose-doc h4 {
    font-size: 1rem;
    font-weight: 600;
    color: hsl(0 0% 98%);
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .prose-doc p {
    margin: 1rem 0;
  }
  .prose-doc a {
    color: #D17D59;
    text-decoration: none;
    border-bottom: 1px solid rgba(209, 125, 89, 0.4);
    transition: border-color 0.15s ease;
  }
  .prose-doc a:hover { border-bottom-color: #D17D59; }
  .prose-doc strong { color: hsl(0 0% 98%); font-weight: 600; }
  .prose-doc em { color: hsl(0 0% 95%); }
  .prose-doc code {
    background-color: rgba(209, 125, 89, 0.12);
    color: #E8A687;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-size: 0.875em;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  .prose-doc pre {
    background-color: #1e1e1c !important;
    border: 1px solid hsl(240 3.7% 15.9%);
    border-radius: 0.5rem;
    padding: 1rem 1.25rem;
    overflow-x: auto;
    margin: 1.25rem 0;
    font-size: 0.875rem;
    line-height: 1.6;
  }
  .prose-doc pre code {
    background-color: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .prose-doc ul, .prose-doc ol {
    margin: 1rem 0;
    padding-left: 1.5rem;
  }
  .prose-doc li {
    margin: 0.375rem 0;
  }
  .prose-doc ul li::marker {
    color: #D17D59;
  }
  .prose-doc ol li::marker {
    color: #D17D59;
    font-weight: 600;
  }
  .prose-doc blockquote {
    border-left: 3px solid #D17D59;
    padding: 0.25rem 0 0.25rem 1rem;
    margin: 1.25rem 0;
    color: hsl(0 0% 75%);
    font-style: italic;
  }
  .prose-doc table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.25rem 0;
    font-size: 0.9375rem;
  }
  .prose-doc th, .prose-doc td {
    border: 1px solid hsl(240 3.7% 15.9%);
    padding: 0.625rem 0.875rem;
    text-align: left;
  }
  .prose-doc th {
    background-color: #2e2e2c;
    color: hsl(0 0% 98%);
    font-weight: 600;
  }
  .prose-doc tr:nth-child(even) td {
    background-color: rgba(46, 46, 44, 0.4);
  }
  .prose-doc hr {
    border: none;
    border-top: 1px solid hsl(240 3.7% 15.9%);
    margin: 2rem 0;
  }
  .prose-doc input[type="checkbox"] {
    margin-right: 0.5rem;
    accent-color: #D17D59;
  }
  .mermaid-diagram {
    background-color: #1e1e1c;
    border: 1px solid hsl(240 3.7% 15.9%);
    border-radius: 0.5rem;
    padding: 1.5rem 1rem;
    margin: 1.25rem 0;
    overflow-x: auto;
    text-align: center;
  }
  .mermaid-diagram svg { max-width: 100%; height: auto; }
  .top-bar {
    border-bottom: 1px solid hsl(240 3.7% 15.9%);
    background-color: #262624;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-link {
    color: #D17D59;
    text-decoration: none;
    font-size: 0.875rem;
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: #E8A687; }
  /* Sidebar — fixed overlay, only when viewport has room beside centered content */
  .sidebar {
    position: fixed;
    left: 0;
    top: 53px;
    width: 200px;
    height: calc(100vh - 53px);
    overflow-y: auto;
    padding: 2rem 1rem 2rem 1.5rem;
    border-right: 1px solid hsl(240 3.7% 15.9%);
    scrollbar-width: thin;
    scrollbar-color: hsl(240 3.7% 20%) transparent;
    display: none;
  }
  @media (min-width: 1280px) {
    .sidebar { display: block; }
  }
  .toc-label {
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: hsl(0 0% 98%);
    margin-bottom: 0.875rem;
  }
  #toc a {
    display: block;
    font-size: 0.8125rem;
    color: hsl(0 0% 60%);
    text-decoration: none;
    padding: 0.25rem 0;
    line-height: 1.45;
    transition: color 0.12s ease;
    border-left: 2px solid transparent;
    padding-left: 0.625rem;
    margin-left: -0.625rem;
  }
  #toc a:hover { color: hsl(0 0% 88%); }
  #toc a.toc-active { color: #D17D59; border-left-color: #D17D59; }
  #toc a.toc-h3 { padding-left: 1.375rem; margin-left: -0.625rem; font-size: 0.775rem; }
  .font-btn:hover { color: #D17D59 !important; }
  /* Audience tab bar */
  .view-participant { display: none; }
  body.mode-participant .view-participant { display: block; }
  body.mode-participant .view-facilitator { display: none; }
  .view-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 1px solid hsl(240 3.7% 15.9%);
  }
  .view-tab {
    padding: 0.5rem 1.25rem;
    border: none;
    background: none;
    color: hsl(0 0% 52%);
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
    transition: color 0.12s, border-color 0.12s;
    letter-spacing: 0.02em;
  }
  .view-tab.active { color: #D17D59; border-bottom-color: #D17D59; }
  .view-tab:hover:not(.active) { color: hsl(0 0% 82%); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="back-link">
      <span>←</span>
      <span>Customer Intelligence &amp; Pitch Suite</span>
    </a>
    <div class="text-xs text-fg-muted" style="color: hsl(0 0% 64%);">Pandan Labs</div>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="toc-label">On This Page</div>
  <nav id="toc"></nav>
</aside>

<main class="max-w-4xl mx-auto px-6 py-12">
  <article id="content" class="prose-doc">
    <p style="color: hsl(0 0% 64%);">Loading…</p>
  </article>
  <footer class="mt-16 pt-8 border-t text-center text-sm" style="border-color: hsl(240 3.7% 15.9%); color: hsl(0 0% 64%);">
    From Pandan Labs with <span class="heart" aria-label="love" title="love">♥</span>
  </footer>
</main>

<script>
  // Parse ?file= query param
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const content = document.getElementById('content');
  const isDaysFile = file && file.startsWith('days/');
  if (isDaysFile) {
    document.body.classList.add('mode-' + (localStorage.getItem('workshopView') || 'facilitator'));
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderWithAudience(md) {
    var PSTART = '<!-- participant-start -->';
    var PEND   = '<!-- participant-end -->';
    var html = '', rest = md;
    while (rest.length) {
      var si = rest.indexOf(PSTART);
      if (si === -1) { html += '<div class="view-facilitator">' + marked.parse(rest) + '</div>'; break; }
      if (si > 0) html += '<div class="view-facilitator">' + marked.parse(rest.slice(0, si)) + '</div>';
      var after = rest.slice(si + PSTART.length);
      var ei = after.indexOf(PEND);
      if (ei === -1) { html += '<div class="view-participant">' + marked.parse(after) + '</div>'; break; }
      html += '<div class="view-participant">' + marked.parse(after.slice(0, ei)) + '</div>';
      rest = after.slice(ei + PEND.length);
    }
    return html;
  }

  function initTabBar() {
    if (!isDaysFile || !content.querySelector('.view-participant')) return;
    var savedMode = localStorage.getItem('workshopView') || 'facilitator';
    var bar = document.createElement('div');
    bar.id = 'view-tabs';
    bar.className = 'view-tabs';
    bar.innerHTML =
      '<button class="view-tab' + (savedMode === 'facilitator' ? ' active' : '') + '" data-view="facilitator">Facilitator</button>' +
      '<button class="view-tab' + (savedMode === 'participant' ? ' active' : '') + '" data-view="participant">Participant</button>';
    content.parentNode.insertBefore(bar, content);
    bar.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-view]');
      if (!btn) return;
      var mode = btn.dataset.view;
      document.body.classList.remove('mode-facilitator', 'mode-participant');
      document.body.classList.add('mode-' + mode);
      localStorage.setItem('workshopView', mode);
      bar.querySelectorAll('.view-tab').forEach(function(b) { b.classList.toggle('active', b.dataset.view === mode); });
      var sb = document.getElementById('sidebar');
      if (sb) sb.style.display = mode === 'participant' ? 'none' : '';
    });
    if (savedMode === 'participant') {
      var sb = document.getElementById('sidebar');
      if (sb) sb.style.display = 'none';
    }
  }

  // Whitelist: only allow files under known content dirs, .md extension, no traversal.
  function isSafePath(p) {
    if (!p) return false;
    if (p.indexOf('..') !== -1) return false;
    if (p.charAt(0) === '/') return false;
    if (!/\.md$/i.test(p)) return false;
    return /^(days|resources|tracks|appendix|cheat-sheets|exercises)\//.test(p);
  }

  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      darkMode: true,
      background: '#1e1e1c',
      primaryColor: '#3a3a38',
      primaryTextColor: 'hsl(0 0% 92%)',
      primaryBorderColor: 'hsl(240 3.7% 22%)',
      lineColor: 'hsl(0 0% 50%)',
      secondaryColor: '#2e2e2c',
      tertiaryColor: '#262624',
      edgeLabelBackground: '#1e1e1c',
      clusterBkg: '#2e2e2c',
      titleColor: 'hsl(0 0% 92%)',
    }
  });

  async function renderMermaid() {
    const blocks = content.querySelectorAll('pre code.language-mermaid');
    for (const block of blocks) {
      const pre = block.parentElement;
      const id = 'mermaid-' + Math.random().toString(36).slice(2, 9);
      try {
        const { svg } = await mermaid.render(id, block.textContent);
        const div = document.createElement('div');
        div.className = 'mermaid-diagram';
        div.innerHTML = svg;
        pre.replaceWith(div);
      } catch (e) {
        console.warn('Mermaid render error:', e);
      }
    }
  }

  function slugify(text) {
    return text.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/[\s]+/g, '-');
  }

  function buildTOC() {
    const toc = document.getElementById('toc');
    const headings = content.querySelectorAll('h2, h3');
    if (headings.length < 2) { document.getElementById('sidebar').style.display = 'none'; return; }
    const seen = {};
    headings.forEach(h => {
      let base = slugify(h.textContent);
      if (!base) base = 'section';
      seen[base] = (seen[base] || 0) + 1;
      h.id = seen[base] > 1 ? base + '-' + seen[base] : base;
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'toc-h3' : '';
      toc.appendChild(a);
    });
  }

  function setupScrollSpy() {
    const links = document.querySelectorAll('#toc a');
    if (!links.length) return;
    const headings = content.querySelectorAll('h2, h3');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          links.forEach(l => l.classList.remove('toc-active'));
          const active = document.querySelector('#toc a[href="#' + entry.target.id + '"]');
          if (active) active.classList.add('toc-active');
        }
      });
    }, { rootMargin: '-10% 0px -75% 0px', threshold: 0 });
    headings.forEach(h => observer.observe(h));
  }

  if (!isSafePath(file)) {
    content.innerHTML = `
      <h1>File not specified</h1>
      <p>This viewer renders markdown content from the workshop. Head back to the <a href="index.html">workshop home</a> and pick a card.</p>
    `;
  } else {
    fetch(file)
      .then(r => {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(async md => {
        marked.setOptions({
          gfm: true,
          breaks: false,
          highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
              try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
            }
            return hljs.highlightAuto(code).value;
          }
        });
        content.innerHTML = isDaysFile ? renderWithAudience(md) : marked.parse(md);
        document.querySelectorAll('pre code').forEach(b => {
          try { hljs.highlightElement(b); } catch (e) {}
        });
        await renderMermaid();
        const h1 = content.querySelector('h1');
        if (h1) document.title = h1.textContent + ' — Pandan Labs';
        buildTOC();
        setupScrollSpy();
        initTabBar();
      })
      .catch(err => {
        content.innerHTML = `
          <h1>Couldn't load that file</h1>
          <p>Tried to load <code>${escapeHtml(file)}</code> but got: <code>${escapeHtml(String(err))}</code>.</p>
          <p>Go back to the <a href="index.html">workshop home</a>.</p>
        `;
      });
  }
</script>

<!-- Font size control — same as index.html, persists across both pages via localStorage -->
<div style="position:fixed;bottom:1.25rem;right:1.25rem;z-index:100;display:flex;align-items:center;gap:0.125rem;background:#2e2e2c;border:1px solid hsl(240 3.7% 20%);border-radius:0.375rem;padding:0.25rem 0.375rem;font-size:14px;">
  <button id="font-dec" class="font-btn" onclick="adjFont(-1)" aria-label="Decrease font size" title="Smaller text"
    style="background:none;border:none;cursor:pointer;color:hsl(0 0% 52%);font-family:ui-monospace,monospace;font-size:11px;padding:0.125rem 0.5rem;border-radius:0.25rem;line-height:1.4;transition:color 0.12s;">A−</button>
  <span id="font-pct"
    style="font-family:ui-monospace,monospace;font-size:9px;color:hsl(0 0% 36%);min-width:1.875rem;text-align:center;display:inline-block;">100%</span>
  <button id="font-inc" class="font-btn" onclick="adjFont(1)" aria-label="Increase font size" title="Larger text"
    style="background:none;border:none;cursor:pointer;color:hsl(0 0% 52%);font-family:ui-monospace,monospace;font-size:11px;padding:0.125rem 0.5rem;border-radius:0.25rem;line-height:1.4;transition:color 0.12s;">A+</button>
</div>
<script>
  (function () {
    var steps = [13, 14, 15, 16, 17, 18, 19, 20];
    var base = 16;
    function getSize() { return parseInt(localStorage.getItem('wsFontSize') || base, 10); }
    function setSize(sz) {
      sz = Math.max(steps[0], Math.min(steps[steps.length - 1], sz));
      document.documentElement.style.fontSize = sz + 'px';
      localStorage.setItem('wsFontSize', sz);
      var pct = document.getElementById('font-pct');
      if (pct) pct.textContent = Math.round(sz / base * 100) + '%';
      var dec = document.getElementById('font-dec');
      var inc = document.getElementById('font-inc');
      if (dec) { dec.disabled = sz <= steps[0]; dec.style.opacity = sz <= steps[0] ? '0.3' : '1'; }
      if (inc) { inc.disabled = sz >= steps[steps.length - 1]; inc.style.opacity = sz >= steps[steps.length - 1] ? '0.3' : '1'; }
    }
    window.adjFont = function (dir) {
      var sz = getSize();
      var idx = steps.indexOf(sz);
      if (idx === -1) idx = steps.indexOf(base);
      setSize(steps[Math.max(0, Math.min(steps.length - 1, idx + dir))]);
    };
    setSize(getSize());
  })();
</script>

</body>
</html>
